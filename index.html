gap:10px}.opt{display:flex;gap:10px;align-items:flex-start;padding:12px;border:2px solid #eceafa;border-radius:18px;cursor:pointer;background:#fbfbff;transition:.12s}.opt:hover{border-color:#bfc5ff}.opt input{margin-top:3px;accent-color:#ff5daf}.opt span{line-height:1.45}.nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:18px}.result{display:none;padding:20px}.resultTop{display:grid;grid-template-columns:320px 1fr;gap:18px;align-items:stretch}.portrait{background:linear-gradient(135deg,#fff,#fff7);border-radius:26px;display:grid;place-items:center;min-height:360px;border:1px solid #fff;overflow:hidden}.realPortrait{width:100%;height:100%;min-height:360px;display:flex;flex-direction:column;background:linear-gradient(135deg,var(--accent),#fff);border-radius:26px;overflow:hidden}.realPortrait img{width:100%;flex:1;min-height:0;object-fit:cover;display:block;background:#fff}.portraitCap{padding:12px 14px;background:rgba(255,255,255,.9);display:flex;flex-direction:column;gap:3px}.portraitCap b{font-size:18px}.portraitCap span{font-size:12px;color:#666;font-weight:800}.info{background:#fff;border-radius:26px;padding:20px;border:1px solid #f0eefb}.roleName{font-size:40px;line-height:1;margin:4px 0;color:#ff3e9f;letter-spacing:-1px}.type{display:inline-flex;border-radius:999px;padding:7px 11px;background:#f1efff;color:#5b50d6;font-weight:950;font-size:13px}.desc{line-height:1.75;color:#55546b}.tags{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}.tag{border-radius:999px;background:#f7f6ff;border:1px solid #e8e5ff;padding:7px 10px;font-weight:800;font-size:13px}.sections{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}.sec{background:#fff;border-radius:22px;padding:16px;border:1px solid #f0eefb}.sec h3{margin:0 0 9px}.sec ul{margin:0;padding-left:20px;line-height:1.75;color:#56546b}.rank{margin-top:16px;background:#fff;border-radius:22px;padding:16px;border:1px solid #f0eefb}.rankrow{display:grid;grid-template-c <header><div class="badge">🧑‍🔬 研究生生存学 × 学术人格</div><h1>研究生<br>学术人格测验</h1><p class="lead">36道情境题，测出你是学术沙僧、葫芦娃、袁华、爱德华、刘姥姥、八戒、吕布、孟获、灰姑娘还是鲁滨逊。娱乐向，但句句扎心。</p></header>
<main class="wrap card">
<section id="intro" class="intro">
  <div><h2>你的论文灵魂是什么形状？</h2><p>请按真实研究生状态作答。每题选择最像你的选项，系统会根据你在组会、写论文、DDL、投稿和摸鱼场景里的选择，生成你的学术角色画像、MBTI风格人物插画和生存建议。</p><div class="actions"><button id="startBtn">开始测评</button></div></div>
  <div class="mini-grid"><div class="mini">📄 36道情境题</div><div class="mini">🎭 10种角色</div><div class="mini">🧠 性格解读</div><div class="mini">🖼️ 自动人物卡</div></div>
</section>
<div class="progressBox" id="progressBox"><div style="display:flex;justify-content:space-between;margin-bottom:8px;font-weight:900"><span id="stepText">第 1 题</span><span id="doneText">0%</span></div><div class="bar"><i id="bar"></i></div></div>
<section id="quiz" class="qbox"></section>
<section id="result" class="result"></section>
</main><div class="foot">仅供娱乐，不构成真实人格诊断；如被扎到，请优先怪DDL。</div>
<script>
const roles={
  shaseng:{name:'学术沙僧',code:'Fe-Si',emoji:'🧘',color:'#6c7cff',traits:['组会附和机','团队润滑剂','安全牌选手'],core:'习惯照顾团队气氛，也更喜欢按熟悉流程做事；短板是独立观点和创新表达容易不足。',summary:'你是组会里的稳定器。别人抛观点，你负责点头、补一句“对对对”。你不爱冒险，也不爱冲突，适合做团队的秩序维护者，但要警惕把“好相处”活成“没声音”。',advice:['每次组会提前准备一个自己的问题。','把“我同意”升级成“我同意，因为……”。','练习提出小假设，哪怕只是一点点不同意见。']},
  huluwa:{name:'学术葫芦娃',code:'Ne-Te',emoji:'🧩',color:'#ff8a32',traits:['七篇合一','缝合奇才','资源整合王'],core:'擅长在不同论文之间找关联，也很看重快速产出；短板是容易忽略原创边界和严谨性。',summary:'你看到文献不是文献，是乐高积木。你能把七篇旧论文拼出一篇“新故事”，效率惊人，脑洞也够用。问题是：拼得太快时，缝合线会从摘要露出来。',advice:['每次整合文献时写清“我的新增点”。','用一张图说明逻辑链，别只堆材料。','查重前先查“意义重复”。']},
  yuanhua:{name:'学术袁华',code:'Se↓Ti',emoji:'🌊',color:'#4fb7ff',traits:['摸鱼达人','组会隐身','秋雅在哪'],core:'很容易被当下的摸鱼和即时快乐吸引；短板是学术逻辑和长期规划容易掉线。',summary:'实验室风很大，你的心很远。你对手机刷新率、外卖满减和摸鱼路线比实验流程熟。活在当下没错，但毕业不会因为你很会摸鱼就自动出现。',advice:['每天只设一个不可逃避的学术动作。','把摸鱼奖励绑定到实验/阅读之后。','用倒计时提醒自己：延毕也是会到来的。']},
  aidward:{name:'学术爱德华',code:'Si-Te',emoji:'✂️',color:'#8f7cff',traits:['Ctrl+C/V大师','模板收藏家','剪刀手'],core:'依赖成熟模板和前人路径，也很重视快速完成任务；短板是原创思考和逻辑重构偏弱。',summary:'你不是在写论文，你是在进行文献炼成术。模板给你安全感，复制让你有进度感。可惜学术世界等价交换：省掉的思考，最后会在返修里还回来。',advice:['复制前先用自己的话写一句目的。','每段至少加入一个真实分析句。','把模板当脚手架，不当房子本身。']},
  liulaolao:{name:'学术刘姥姥',code:'Ne-Se',emoji:'👀',color:'#54e6a4',traits:['新手小白','仪器观光客','十万个为什么'],core:'新鲜感和探索欲很强，但经验库还不够厚，所以容易对什么都好奇、什么都想问。',summary:'你进实验室像进大观园：这个会发光，那个会响，所有缩写都像咒语。你的好奇心很宝贵，只要配上记录和复盘，就会从“没见过世面”升级成“学习速度惊人”。',advice:['建立自己的实验室词典。','问问题前先写下你猜的答案。','每次操作后拍照/记步骤，沉淀经验库。']},
  bajie:{name:'学术八戒',code:'Se-Fi',emoji:'🍰',color:'#ff71a8',traits:['茶歇雷达','退学幻想家','干饭优先'],core:'很重视即时感受和情绪状态；短板是目标规划和长期坚持经常掉线。',summary:'会议内容可能记不住，但茶歇小蛋糕的位置你永远清楚。你不是没有能力，是能量经常被“我不想干了”劫持。先把自己喂饱，再把进度救回来。',advice:['给任务设计“茶歇式奖励”。','情绪上头时不要立刻做退学决定。','用番茄钟把任务切成能入口的小块。']},
  lvbu:{name:'学术吕布',code:'Te-Ti',emoji:'🐎',color:'#f04b68',traits:['义父识别器','现实主义者','见风使舵'],core:'很会看资源、看结果、判断利弊；短板是情感联结和关系维护容易显得功利。',summary:'谁能带飞，谁就是义父；导师放养，你立刻“岂能久居人下”。你很会找资源，也懂利益排序。请记得：学术江湖不仅看战力，也看口碑。',advice:['换方向/换合作前留下体面交接。','把资源判断和长期信誉一起算。','不要只认强者，也要经营稳定盟友。']},
  menghuo:{name:'学术孟获',code:'Te-Ni',emoji:'🛡️',color:'#25c46f',traits:['七擒七纵','拒稿战神','越挫越勇'],core:'目标感和推进力很强，相信反复修改终会有结果；失败不太容易把你彻底打垮。',summary:'审稿人拒你一次，你改；拒你两次，你再投；拒你七次，你已经能背诵cover letter。你是学术耐久型选手，缺点是可能把硬刚误认为成长。',advice:['每次拒稿提炼三条可复用教训。','区分“坚持”与“方向错误”。','找外部读者帮你判断是否该换期刊/换叙事。']},
  huiguniang:{name:'学术灰姑娘',code:'Se-Ni',emoji:'🕛',color:'#b16cff',traits:['DDL骑士','午夜魔法','卡点大师'],core:'平时容易活在当下、缺少提前规划；但最后期限逼近时，会突然启动危机感和爆发力。',summary:'不到十二点，魔法不会发动；不到死线前夜，你的Word不会自动打开。你有爆发力，但长期靠肾上腺素写论文，迟早南瓜马车变救护车。',advice:['把大DDL拆成三个假DDL。','先交丑稿，不等灵感降临。','用公开承诺制造外部压力。']},
  lubinxun:{name:'学术鲁滨逊',code:'Fi-Se',emoji:'🏝️',color:'#d59b45',traits:['荒岛求生','周五信徒','蓬头垢面'],core:'很受内在情绪和当下生存状态影响；短板是长期建设和目标规划偏弱。',summary:'你在学术荒岛上醒来：今天的目标是找吃的、活下去、等周五。你很真实，也很能熬。可如果只求生不建造，荒岛永远只是荒岛。',advice:['给每周设一个“建造任务”，不是只活着。','固定睡眠和吃饭，先修复生存系统。','找一个同伴互报进度，减少孤岛感。']}
};

 ['如果同门和导师意见冲突，你倾向：',{shaseng:'先照顾双方情绪，避免场面难看',lvbu:'判断哪边资源和胜算更大',menghuo:'只关心哪个方案更能推动发表',lubinxun:'别波及我，我先活下去'}],

];
let idx=0,answers=[];const $=id=>document.getElementById(id);
function drawAvatar(key){
 const r=roles[key];
 const palette={
  shaseng:'#6c7cff',huluwa:'#ff8a32',yuanhua:'#4fb7ff',aidward:'#8f7cff',liulaolao:'#54e6a4',bajie:'#ff71a8',lvbu:'#f04b68',menghuo:'#25c46f',huiguniang:'#b16cff',lubinxun:'#d59b45'
 }[key]||'#6c7cff';
 return `<div class="realPortrait" style="--accent:${palette}">
   <img src="./assets/${key}.png?v=202604260053" alt="${r.name} MBTI风格人物形象图" loading="eager" onerror="this.onerror=null;this.src='assets/'+key+'.png?v='+Date.now()" />
   <div class="portraitCap"><b>${r.emoji} ${r.name}</b><span>MBTI风格研究生角色卡</span></div>
 </div>`
}

function renderQ(){const quiz=$('quiz'),q=questions[idx];$('stepText').textContent=`第 ${idx+1} / ${questions.length} 题`;$('doneText').textContent=Math.round(idx/questions.length*100)+'%';$('bar').style.width=(idx/questions.length*100)+'%';quiz.innerHTML=`<div class="q"><h3>${idx+1}. ${q[0]}</h3><div class="opts">${Object.entries(q[1]).map(([k,v],i)=>`<label class="opt"><input type="radio" name="q" value="${k}" ${answers[idx]===k?'checked':''}><span>${v}</span></label>`).join('')}</div></div><div class="nav"><button class="ghost" id="prev" ${idx===0?'disabled style="opacity:.45"':''}>上一题</button><button id="next">${idx===questions.length-1?'查看结果':'下一题'}</button></div>`;quiz.querySelectorAll('input').forEach(x=>x.onchange=e=>{answers[idx]=e.target.value;setTimeout(next,120)});$('prev').onclick=()=>{if(idx>0){idx--;renderQ();scrollTo(0,0)}};$('next').onclick=next}
function next(){if(!answers[idx]){alert('先选一个最像你的状态吧～');return}if(idx<questions.length-1){idx++;renderQ();scrollTo(0,0)}else showResult()}
function score(){const s={};Object.keys(roles).forEach(k=>s[k]=0);answers.forEach(k=>s[k]++);return s}
function showResult(){document.body.classList.remove('quizMode');document.body.classList.add('resultMode');const s=score();const sorted=Object.entries(s).sort((a,b)=>b[1]-a[1]);const top=sorted[0][0],r=roles[top],max=Math.max(...Object.values(s));$('quiz').style.display='none';$('progressBox').style.display='none';const res=$('result');res.style.display='block';res.innerHTML=`<div class="resultTop"><div class="portrait">${drawAvatar(top)}</div><div class="info"><span class="type">学术人格测试结果</span><h2 class="roleName">${r.emoji} ${r.name}</h2><p class="desc">${r.summary}</p><div class="tags">${r.traits.map(t=>`<span class="tag">${t}</span>`).join('')}</div><p class="desc"><b>性格倾向：</b>${r.core}</p><div class="actions"><button id="again">再测一次</button><button class="secondary" id="share">复制结果</button></div></div></div><div class="sections"><div class="sec"><h3>你的学术超能力</h3><ul>${power(top).map(x=>`<li>${x}</li>`).join('')}</ul></div><div class="sec"><h3>生存建议</h3><ul>${r.advice.map(x=>`<li>${x}</li>`).join('')}</ul></div></div><div class="rank"><h3>角色匹配度</h3>${sorted.map(([k,v])=>`<div class="rankrow"><span>${roles[k].name.replace('学术','')}</span><div class="rankbar"><i style="width:${Math.round(v/max*100)}%"></i></div><span>${v}</span></div>`).join('')}</div>`;$('again').onclick=()=>location.reload();$('share').onclick=()=>{const text=`我的研究生学术人格是：${r.name}（${r.code}）\n${r.summary}`;navigator.clipboard?.writeText(text);alert('结果已复制～')};scrollTo(0,0)}
function power(k){return {shaseng:['稳定团队气氛，让组会不至于爆炸。','流程感强，适合维护规范和协作节奏。','只要开始表达观点，会很快变成可靠合作者。'],huluwa:['跨文献整合能力强，能把材料讲成故事。','效率高，擅长从混乱信息里找结构。','适合综述、交叉学科、选题包装。'],yuanhua:['当下感强，擅长发现生活里的快乐入口。','危机没来时心态稳定，不容易过度焦虑。','若能绑定外部监督，潜力会突然上线。'],aidward:['熟悉范式，能快速搭建论文骨架。','执行目标明确，交付速度快。','适合做格式、规范、文献脉络整理。'],liulaolao:['好奇心强，学习初期吸收面很广。','敢问问题，能快速补齐盲区。','新鲜感会带来持续探索动力。'],bajie:['知道照顾即时感受，不会把自己逼到彻底宕机。','社交与茶歇雷达强，适合发现会议信息差。','把奖励机制设计好后，执行力会提升。'],lvbu:['资源嗅觉敏锐，懂得选择高收益路径。','判断利弊快，擅长寻找助力。','适合项目推进、合作谈判和机会捕捉。'],menghuo:['抗拒稿能力强，能持续迭代。','目标感明确，越挫越勇。','适合长周期投稿、实验攻坚和返修拉扯。'],huiguniang:['短期爆发力惊人，压线时能进入战斗状态。','临场整合能力强，能在混乱中抓重点。','若提前启动，会非常能打。'],lubinxun:['韧性强，能在低资源状态下撑住。','对真实需求敏感，知道先保障生存。','一旦建立秩序，会从求生者变建设者。']}[k]}
$('startBtn').onclick=()=>{document.body.classList.add('quizMode');document.body.classList.remove('resultMode');$('intro').style.display='none';$('quiz').style.display='block';$('progressBox').style.display='block';renderQ();scrollTo(0,0)};
</script>
